name: Build PDF

on:
  push:
    paths:
      - "main.typ"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 日本語明朝体フォントをインストール ──
      - name: Install Japanese fonts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv

      # ── Typst → README.md 変換 ──
      - name: Generate README from Typst
        run: python convert.py main.typ README.md

      # ── README.md をコミット・プッシュ ──
      - name: Commit README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update README from main.typ [skip ci]"
          git push

      # ── Typst インストール ──
      - name: Install Typst
        run: |
          curl -L https://github.com/typst/typst/releases/latest/download/typst-x86_64-unknown-linux-musl.tar.xz | tar xJ
          sudo mv typst-*/typst /usr/local/bin/

      # ── PDF ビルド ──
      - name: Build PDF
        run: typst compile main.typ main.pdf

      # ── PDF をアーティファクトとして保存 ──
      - name: Upload PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: output-pdf
          path: main.pdf
